<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>LOVE TESTER | 愛情相容性測試</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --neon: #ff69b4; --bg: #0d0006; --btn-grad: linear-gradient(135deg, #ff1493, #ff69b4); }
        body { background: var(--bg); color: #fff; font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .container { 
            background: rgba(30, 0, 15, 0.95); 
            border: 4px solid var(--neon); 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.4); 
            width: 100%; 
            max-width: 700px; 
            text-align: center; 
        }

        h1 { font-size: 48px; color: var(--neon); text-shadow: 0 0 20px var(--neon); margin: 10px 0; font-weight: 900; letter-spacing: 2px; }
        
        .question { font-size: 24px; margin: 20px 0 30px; font-weight: bold; }
        
        /* 巨大遊戲按鈕 */
        .options button { 
            display: block; width: 100%; padding: 20px; margin: 15px 0; 
            border: none; background: #222; color: #fff; 
            border-radius: 50px; cursor: pointer; font-size: 20px; font-weight: bold;
            transition: 0.2s; border-bottom: 5px solid #000;
        }
        .options button:hover { background: var(--neon); transform: translateY(-3px); border-bottom: 5px solid #b0005a; }
        .options button:active { transform: translateY(2px); border-bottom: 0; }

        /* 左右並排配置 */
        .info-flex { display: flex; gap: 20px; text-align: left; flex-wrap: wrap; margin-top: 20px; }
        .info-column { flex: 1; min-width: 250px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; }
        .info-column h3 { color: var(--neon); margin-top: 0; border-bottom: 1px solid var(--neon); padding-bottom: 10px; }

        label { font-size: 14px; color: #ffb6c1; display: block; margin: 10px 0 5px; }
        input { 
            width: 100%; padding: 12px; background: #000; border: 2px solid #444; 
            color: #fff; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--neon); }

        .notice { font-size: 14px; background: #400; padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--neon); }

        .btn-submit { 
            background: var(--btn-grad); color: #fff; border: none; padding: 25px; 
            width: 100%; font-size: 24px; font-weight: 900; border-radius: 50px; 
            cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(255, 20, 147, 0.4);
            border-bottom: 6px solid #b0005a; transition: 0.2s;
        }
        .btn-submit:hover { filter: brightness(1.1); transform: scale(1.02); }

        .progress-box { width: 100%; background: #333; height: 15px; margin: 30px 0; display: none; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; background: var(--neon); height: 100%; box-shadow: 0 0 15px var(--neon); }

        .hidden { display: none; }
        #final-score { font-size: 100px; font-weight: 900; color: var(--neon); text-shadow: 0 0 30px var(--neon); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>LOVE TESTER</h1>
    
    <div id="start-section">
        <p>想知道你們的靈魂契合度嗎？回答 5 個問題來揭曉！</p>
        <button class="btn-submit" onclick="startGame()">START GAME</button>
    </div>

    <div id="quiz-section" class="hidden">
        <div id="q-text" class="question"></div>
        <div id="q-options" class="options"></div>
    </div>

    <div id="info-section" class="hidden">
        <div class="notice">
            ※ 系統需收集雙方姓名與 Email 以運算最終相容性百分比。
        </div>

        <div class="info-flex">
            <div class="info-column">
                <h3>YOUR INFO</h3>
                <label>中文姓名 (2-3字)</label>
                <input type="text" id="u-cname" placeholder="王小明">
                <label>英文姓名 (1-3單字)</label>
                <input type="text" id="u-ename" placeholder="David Wang">
                <label>電子郵件</label>
                <input type="email" id="u-gmail" placeholder="example@mail.com">
            </div>
            
            <div class="info-column">
                <h3>PARTNER INFO</h3>
                <label>中文姓名 (2-3字)</label>
                <input type="text" id="p-cname" placeholder="李美美">
                <label>英文姓名 (1-3單字)</label>
                <input type="text" id="p-ename" placeholder="Mary Chen">
                <label>電子郵件</label>
                <input type="email" id="p-gmail" placeholder="example@mail.com">
            </div>
        </div>

        <div id="progress-area" class="progress-box"><div id="bar" class="progress-bar"></div></div>
        <button id="submit-btn" class="btn-submit" onclick="validateAndSubmit()">GET THE RESULT %</button>
    </div>

    <div id="result-section" class="hidden">
        <div style="font-size: 20px;">你們的愛情契合度為：</div>
        <div id="final-score">0%</div>
        <p id="eval-text" style="font-size: 24px; font-weight: bold; color: #ffb6c1;"></p>
        <button onclick="location.reload()" style="background:none; border:1px solid #666; color:#999; padding:10px 20px; cursor:pointer; border-radius:10px; margin-top: 30px;">RETRY</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwNk-6smFkU1t6zSDdD1euzrPqU37tNvpoViTp5dFPfYrK5XecJSxPW2PZok467AYqm/exec'; 

    const questions = [
        { q: "吵架後誰會先主動和好？", a: ["互相溝通", "對方", "我", "冷戰到底"] },
        { q: "理想的假日活動是？", a: ["旅遊踏青", "宅家看電影", "各自跟朋友去玩", "不知道要幹嘛"] },
        { q: "對未來的目標是否一致？", a: ["非常有共識", "大致相同", "討論過但不確定", "完全沒談過"] },
        { q: "你對對方的信任感？", a: ["100% 絕對信任", "80% 偶爾查勤", "50% 保持警覺", "完全沒安全感"] },
        { q: "對方記得你的特殊日子嗎？", a: ["每年都用心過", "簡單慶祝", "提醒才記得", "完全不記得"] }
    ];

    let currentQ = 0, score = 0;

    function startGame() {
        document.getElementById('start-section').style.display = 'none';
        document.getElementById('quiz-section').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ < questions.length) {
            document.getElementById('q-text').innerText = questions[currentQ].q;
            const opts = document.getElementById('q-options');
            opts.innerHTML = '';
            questions[currentQ].a.forEach((ans, i) => {
                const b = document.createElement('button');
                b.innerText = ans;
                b.onclick = () => { score += (20 - i*5); currentQ++; loadQuestion(); };
                opts.appendChild(b);
            });
        } else {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('info-section').classList.remove('hidden');
        }
    }

    function validateAndSubmit() {
        const uc = document.getElementById('u-cname').value.trim();
        const pc = document.getElementById('p-cname').value.trim();
        const ue = document.getElementById('u-ename').value.trim();
        const pe = document.getElementById('p-ename').value.trim();
        const ug = document.getElementById('u-gmail').value.trim();
        const pg = document.getElementById('p-gmail').value.trim();

        const chiRegex = /^[\u4e00-\u9fa5]{2,3}$/;
        const engRegex = /^[a-zA-Z]+(\s[a-zA-Z]+){0,2}$/;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!chiRegex.test(uc) || !chiRegex.test(pc)) { alert("中文名必須是 2 或 3 個字！"); return; }
        if (!engRegex.test(ue) || !engRegex.test(pe)) { alert("英文名必須是 1-3 個單字！"); return; }
        if (!emailRegex.test(ug) || !emailRegex.test(pg)) { alert("請輸入正確格式的 Email！"); return; }

        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('progress-area').style.display = 'block';
        
        let width = 0;
        let interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                realSubmit(uc, ue, ug, pc, pe, pg);
            } else {
                width += 2;
                document.getElementById('bar').style.width = width + "%";
            }
        }, 40);
    }

    function realSubmit(uc, ue, ug, pc, pe, pg) {
        const finalScoreValue = Math.min(100, Math.max(0, score)) + "%";
        const data = { score: finalScoreValue, u_cname: uc, u_ename: ue, u_gmail: ug, p_cname: pc, p_ename: pe, p_gmail: pg };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

        setTimeout(() => {
            document.getElementById('info-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('final-score').innerText = finalScoreValue;
            let eval = score >= 80 ? "絕佳配對！" : (score >= 60 ? "天作之合。" : "再接再厲。");
            document.getElementById('eval-text').innerText = eval;
        }, 500);
    }
</script>
</body>
</html>
